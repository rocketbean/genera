# Local storage emulators for the Genera conformance kit (plan Phase 2).
# Start only what you need, e.g.: `docker compose up -d minio`.
#
#   S3    -> MinIO            :9000 (console :9001)
#   Azure -> Azurite         :10000
#   GCS   -> fake-gcs-server :4443
services:
  # S3-compatible emulator for @rocketbean/genera-s3.
  # API on :9000, web console on :9001 (login minioadmin / minioadmin).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio-data:/data

  # Azure Blob emulator for @rocketbean/genera-azure.
  # Uses the well-known Azurite dev account (devstoreaccount1).
  # Host port is 11000 (10000 is Azurite's default but is often already taken);
  # point the connection string's BlobEndpoint at http://127.0.0.1:11000/devstoreaccount1.
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    # --skipApiVersionCheck: the Azure SDK negotiates a newer REST API version
    # than the emulator image ships with; safe to skip for local tests.
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck
    ports:
      - "11000:10000"

  # Google Cloud Storage emulator for @rocketbean/genera-gcs.
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    command: -scheme http -host 0.0.0.0 -port 4443 -public-host localhost:4443
    ports:
      - "4443:4443"

volumes:
  minio-data:
